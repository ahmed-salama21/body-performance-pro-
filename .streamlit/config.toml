# ============================================
# Streamlit Configuration File
# Body Performance Analytics - Professional Light Theme
# ============================================

[theme]
# اللون الأساسي للأزرار والروابط والعناصر التفاعلية
primaryColor = "#00A3C4"

# خلفية الصفحة الرئيسية (أبيض ناعم)
backgroundColor = "#FFFFFF"

# خلفية العناصر الثانوية مثل الكروت والسايد بار (رمادي فاتح جدًا)
secondaryBackgroundColor = "#F8F9FC"

# لون النصوص الرئيسية (رمادي غامق لتباين جيد)
textColor = "#1E1E2F"

# نوع الخط المستخدم في التطبيق
font = "sans serif"

# ============================================
# إعدادات إضافية (اختيارية)
# ============================================

[server]
# منع إعادة التشغيل التلقائي عند تغيير الملفات (للسيرفر)
runOnSave = false

[browser]
# عنوان التطبيق في المتصفح
gatherUsageStats = false

[client]
# عرض شريط الأدوات
toolbarMode = "auto"
